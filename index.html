<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnHub · 学习中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">📖 <span>LearnHub</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard">
          <i data-lucide="layout-dashboard"></i><span>仪表盘</span>
        </a>
        <a href="#" class="nav-item" data-view="notes">
          <i data-lucide="file-text"></i><span>学习笔记</span>
        </a>
        <a href="#" class="nav-item" data-view="summaries">
          <i data-lucide="book-open"></i><span>个人总结</span>
        </a>
        <a href="#" class="nav-item" data-view="subjects">
          <i data-lucide="folder-tree"></i><span>科目管理</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-stats" id="sidebar-stats"></div>
      </div>
    </aside>

    <main class="main-content" id="main-content">
      <div class="content-toolbar" id="content-toolbar">
        <div class="toolbar-left">
          <button class="icon-btn sidebar-toggle" id="sidebar-toggle" title="切换侧栏">
            <i data-lucide="panel-left-close"></i>
          </button>
          <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="global-search" placeholder="搜索笔记或总结…">
          </div>
        </div>
        <div class="toolbar-right" id="toolbar-right"></div>
      </div>
      <div class="content-body" id="view-container"></div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="icon-btn" id="modal-close"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
