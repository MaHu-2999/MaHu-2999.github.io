<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnHub · 考研学习中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app" id="main-app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">📖 <span>LearnHub</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="home">
          <i data-lucide="home"></i><span>首页</span>
        </a>
        <a href="#" class="nav-item" data-view="notes">
          <i data-lucide="file-text"></i><span>学习笔记</span>
        </a>
        <a href="#" class="nav-item" data-view="review">
          <i data-lucide="refresh-cw"></i><span>复习回顾</span>
        </a>
        <a href="#" class="nav-item" data-view="timer">
          <i data-lucide="clock"></i><span>学习计时</span>
        </a>
        <a href="#" class="nav-item" data-view="summaries">
          <i data-lucide="book-open"></i><span>个人总结</span>
        </a>
        <a href="#" class="nav-item" data-view="subjects">
          <i data-lucide="folder-tree"></i><span>科目管理</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-stats" id="sidebar-stats"></div>
      </div>
    </aside>

    <main class="main-content" id="main-content">
      <div class="content-toolbar" id="content-toolbar">
        <div class="toolbar-left">
          <button class="icon-btn sidebar-toggle" id="sidebar-toggle" title="切换侧栏">
            <i data-lucide="panel-left-close"></i>
          </button>
          <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="global-search" placeholder="搜索笔记或总结…">
          </div>
        </div>
        <div class="toolbar-right" id="toolbar-right"></div>
      </div>
      <div class="content-body" id="view-container"></div>
    </main>
  </div>

  <button class="ai-chat-toggle" id="ai-chat-toggle" title="AI 学习助手">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4v1H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4Z"/><path d="M8 11h8"/><path d="M8 15h5"/></svg>
  </button>

  <div class="ai-chat-panel" id="ai-chat-panel">
    <div class="ai-chat-header">
      <span>AI 学习助手</span>
      <button class="icon-btn" id="ai-chat-close" style="width:28px;height:28px;"><i data-lucide="x"></i></button>
    </div>
    <div class="ai-chat-messages" id="ai-chat-messages">
      <div class="ai-msg ai-msg-bot">
        <div class="ai-msg-content">你好！我是你的考研学习助手，可以帮你解答问题、总结知识点、出练习题。配置 API 密钥后即可使用。</div>
      </div>
    </div>
    <div class="ai-chat-input-wrap">
      <input class="ai-chat-input" id="ai-chat-input" type="text" placeholder="输入你的问题…">
      <button class="ai-chat-send" id="ai-chat-send" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="ai-chat-footer">
      <div class="ai-settings" id="ai-settings-toggle" style="cursor:pointer;font-size:11px;color:var(--c-text-secondary);text-decoration:underline;">配置 API 密钥</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="icon-btn" id="modal-close"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
